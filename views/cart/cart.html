<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Giỏ hàng - LENS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
fontFamily: {
sans: ['Inter', 'sans-serif'],
serif: ['Playfair Display', 'serif'],
}
}
}
}
</script>

</head>

<body class="bg-white font-sans text-stone-800">

<!-- HEADER -->
<div class="flex justify-between items-center p-6 border-b">

<div class="font-serif italic text-3xl">
Lens<span class="text-amber-600">.</span>
</div>

<a href="trangchu.html"
class="text-sm font-bold uppercase tracking-widest text-stone-600 hover:text-amber-600 transition">
Trang chủ
</a>

</div>


<!-- PAGE -->
<div class="max-w-6xl mx-auto p-10">

<h1 class="font-serif text-4xl mb-10">
Giỏ hàng của bạn
</h1>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

<!-- DANH SÁCH SẢN PHẨM -->
<div class="lg:col-span-2">

<table class="w-full text-left">

<thead class="border-b text-sm uppercase text-stone-500 tracking-wider">

<tr>
<th class="pb-3">Sản phẩm</th>
<th>Loại</th>
<th>Giá</th>
<th>Số lượng</th>
<th>Tổng</th>
<th></th>
</tr>

</thead>

<tbody id="cart-items" class="divide-y">

</tbody>

</table>

</div>


<!-- BOX THANH TOÁN -->
<div>

<div class="bg-stone-50 p-8 rounded-2xl shadow-sm">

<h2 class="font-serif text-2xl mb-6">
Thanh toán
</h2>

<div class="space-y-3 text-sm">

<div class="flex justify-between">
<span>Tạm tính</span>
<span id="subtotal"></span>
</div>

<div class="flex justify-between">
<span>Phí ship</span>
<span>30.000 đ</span>
</div>

<div class="flex justify-between">
<span>Thuế</span>
<span>10%</span>
</div>

</div>

<div class="border-t mt-6 pt-6 flex justify-between font-bold text-lg">

<span>Tổng</span>
<span id="total"></span>

</div>

<a href="checkout.html"
class="mt-8 block text-center py-4 bg-stone-900 text-white rounded-full text-sm font-bold tracking-widest uppercase hover:bg-stone-800 transition">
Thanh toán
</a>

</div>

</div>

</div>

</div>


<script src="js/cart.js"></script>

</body>

</html>
