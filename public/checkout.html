<!DOCTYPE html>
<html>
<head>
<title>Thông tin đặt hàng</title>
<style>

body{
font-family: Arial;
padding:40px;
}

.container{
width:400px;
margin:auto;
border:1px solid #ddd;
padding:20px;
border-radius:8px;
}

input{
width:100%;
padding:8px;
margin:8px 0;
}

button{
background:black;
color:white;
padding:10px;
border:none;
width:100%;
}

</style>
</head>

<body>

<h2>Thông tin đặt hàng</h2>

<div class="container">

<label>Tên khách hàng</label>
<input type="text" id="name">

<label>Số điện thoại</label>
<input type="text" id="phone">

<label>Địa chỉ</label>
<input type="text" id="address">

<label>Thông số mắt</label>
<input type="text" id="eye">

<button onclick="placeOrder()">Đặt hàng</button>

</div>

<script>

function placeOrder() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if (!name || !phone || !address) {
        alert("Vui lòng nhập đầy đủ thông tin giao hàng");
        return;
    }

    // Logic xử lý đơn hàng (Gửi về server nếu có)
    alert("Cảm ơn " + name + "! Đơn hàng của bạn đã được tiếp nhận.");
    
    localStorage.removeItem("cart"); // Xóa giỏ hàng sau khi đặt thành công
    window.location.href = "trangchu.html";
}
</script>

</body>
</html>
