
<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Giỏ hàng - LENS</title>

<link rel="stylesheet" href="/SELLING-GLASSES/public/assets/css/cart.css">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'sans-serif'],
        serif: ['Playfair Display', 'serif'],
      }
    }
  }
}
</script>

</head>

<body class="bg-white font-sans text-stone-800">

<!-- HEADER -->
<div class="flex justify-between items-center p-6 border-b">

<div class="font-serif text-3xl font-bold tracking-wide">
EYESGLASS<span class="text-amber-600">.</span>
</div>

<a href="trangchu.html"
class="text-sm font-bold uppercase tracking-widest text-stone-600 hover:text-amber-600 transition">

</a>

<h1 class="font-serif text-4xl mb-10">
Giỏ hàng của bạn
</h1>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-16 items-start">

<div class="lg:col-span-3">

<table class="w-full border-separate border-spacing-y-10">

<thead class="text-sm uppercase text-stone-500 tracking-wider">
<tr class="text-left">
<th class="w-32"></th>
<th class="w-72">SẢN PHẨM</th>
<th class="w-40">LOẠI</th>

<tbody id="cart-items" class="divide-y"></tbody>

</table>

<div>

<div class="space-y-3 text-sm">

<div class="flex justify-between">
<span>Tạm tính</span>
<span id="subtotal"></span>
</div>

<div class="flex justify-between">
<span>Phí ship</span>
<span>30.000 đ</span>
</div>

<div class="flex justify-between">

</div>

</div>

<div class="border-t mt-6 pt-6 flex justify-between font-bold text-lg">

</div>

</div>
